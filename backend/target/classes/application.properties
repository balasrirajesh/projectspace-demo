spring.application.name=alumni-app
spring.datasource.url=jdbc:h2:mem:alumnidb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Allow cross-origin requests from Flutter (especially web)
server.port=8080
# Bind to all network interfaces (not just loopback) so devices can connect
server.address=0.0.0.0
server.error.include-message=always
server.error.include-binding-errors=always
