name: graduway
description: GraduWay - Unified Alumni-Student Guidance Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  provider: ^6.1.1

  # Navigation
  go_router: ^13.2.0

  # Animations
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  animations: ^2.1.2

  # UI Components
  google_fonts: ^8.0.2
  device_preview: ^1.3.1
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.2.4
  percent_indicator: ^4.2.3
  fl_chart: ^0.67.0
  timeline_tile: ^2.0.0
  card_swiper: ^3.0.1

  # Icons & Assets
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.0
  shared_preferences: ^2.5.4
  image_picker: ^1.1.2
  uuid: ^4.3.3
  http: ^1.1.0
  flutter_dotenv: ^5.1.0

  # Multimedia & Real-time (Rajesh)
  flutter_webrtc: ^1.4.0
  socket_io_client: ^3.1.2
  video_player: ^2.8.2
  chewie: ^1.7.0
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/animations/
